<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quran - AI Powered App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 600px; width: 90%; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #667eea; border-radius: 5px; font-size: 16px; margin-bottom: 20px; }
        button { background: #667eea; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #764ba2; }
        #result { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 5px; display: none; }
        #result.show { display: block; }
        .ayah { line-height: 2; font-size: 18px; color: #333; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 The Quran</h1>
        <p class="subtitle">AI-Powered Quran App (Coming Soon)</p>
        <input type="text" class="search-box" placeholder="Search Surah or Ayah..." id="searchInput">
        <button onclick="search()">Search</button>
        <div id="result">
            <p>Search functionality coming soon with ML features!</p>
        </div>
    </div>
    <script>
        function search() {
            const input = document.getElementById('searchInput').value;
            const result = document.getElementById('result');
            if (input.trim()) {
                result.classList.add('show');
            }
        }
    </script>
</body>
</html>
