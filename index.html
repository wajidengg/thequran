<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quran - AI Powered App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mada:wght@400;700&display=swap');
        
        @font-face {
            font-family: 'KFGQPC';
            src: url('https://cdn.jsdelivr.net/npm/quran-fonts/fonts/KFGQPC-Uthmanic.ttf') format('truetype');
        }
        
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --dark-bg: #1a1a2e;
            --dark-card: #16213e;
            --light-bg: #f5f7fa;
            --light-card: #ffffff;
            --text-dark: #333;
            --text-light: #e0e0e0;
            --accent: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Mada', 'Segoe UI', 'Arial Unicode MS', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        header h1 { font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        header p { text-align: center; opacity: 0.9; font-size: 1.1em; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid var(--primary);
            border-radius: 5px;
            font-size: 16px;
            background: var(--light-card);
            color: var(--text-dark);
        }

        body.dark-mode .search-box {
            background: var(--dark-card);
            color: var(--text-light);
            border-color: var(--secondary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--secondary); transform: translateY(-2px); }

        .btn-secondary { background: var(--accent); color: white; }
        .btn-secondary:hover { background: #e67e22; transform: translateY(-2px); }

        .btn-dark { background: var(--text-dark); color: white; }
        body.dark-mode .btn-dark { background: var(--text-light); color: var(--dark-bg); }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .surahs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .surah-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .surah-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        .surah-number { font-size: 0.9em; opacity: 0.8; margin-bottom: 10px; }
        .surah-name-en { font-size: 1.5em; font-weight: bold; margin-bottom: 8px; }
        .surah-name-ar { font-size: 1.6em; margin-bottom: 15px; direction: rtl; text-align: right; font-weight: bold; font-family: 'KFGQPC', 'Mada', sans-serif; }
        .surah-ayahs { font-size: 0.95em; opacity: 0.9; }

        .detail-view {
            background: var(--light-card);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        body.dark-mode .detail-view { background: var(--dark-card); }

        .surah-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .surah-header h2 { font-size: 2em; margin-bottom: 10px; }
        .surah-header-ar { font-size: 2em; direction: rtl; text-align: right; margin-bottom: 15px; font-weight: bold; font-family: 'KFGQPC', 'Mada', sans-serif; }

        .surah-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            font-size: 0.95em;
            opacity: 0.9;
        }

        .ayahs-container { display: grid; gap: 20px; }

        .ayah {
            background: var(--light-bg);
            padding: 25px;
            border-left: 4px solid var(--primary);
            border-radius: 5px;
        }

        body.dark-mode .ayah { background: rgba(255,255,255,0.05); border-left-color: var(--secondary); }

        .ayah-number { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 0.9em; }
        
        .ayah-text-ar { 
            font-size: 2em;
            direction: rtl;
            text-align: right;
            margin-bottom: 20px;
            line-height: 2.8;
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 0.2px;
            font-family: 'KFGQPC', 'Mada', sans-serif;
        }

        .ayah-text-en { 
            font-size: 1.05em;
            color: #555;
            margin-bottom: 10px;
            line-height: 1.8;
            font-style: italic;
        }

        body.dark-mode .ayah-text-en { color: #aaa; }

        .ml-section {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.1) 0%, rgba(230, 126, 34, 0.1) 100%);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid var(--accent);
        }

        .ml-section h3 { color: var(--accent); margin-bottom: 10px; }

        .loading { text-align: center; padding: 40px; color: var(--primary); }

        .spinner {
            border: 4px solid var(--light-bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .no-results { text-align: center; padding: 40px; color: #999; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number { font-size: 1.8em; font-weight: bold; }
        .stat-label { font-size: 0.9em; opacity: 0.9; }

        .back-btn { display: inline-block; margin-bottom: 20px; }

        @media (max-width: 768px) {
            header h1 { font-size: 1.8em; }
            .surahs-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .controls { flex-direction: column; }
            .search-box { width: 100%; }
            .ayah-text-ar { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 The Quran</h1>
            <p>AI-Powered Quran App with Real-time Search & Translations</p>
        </header>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="Search by Surah name or number...">
            <button class="btn btn-primary" onclick="showView('list')">All Surahs</button>
            <button class="btn btn-secondary" onclick="showRandomSurah()">Random Surah</button>
            <button class="btn btn-dark" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <div id="listView" class="view-section active">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number">114</div>
                    <div class="stat-label">Total Surahs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">6236</div>
                    <div class="stat-label">Total Ayahs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="searchCount">114</div>
                    <div class="stat-label">Matching Results</div>
                </div>
            </div>
            <div id="surahsList" class="surahs-grid"></div>
        </div>

        <div id="detailView" class="view-section">
            <button class="btn btn-primary back-btn" onclick="showView('list')">← Back to Surahs</button>
            <div id="surahDetail" class="detail-view"></div>
        </div>

        <div id="loadingView" class="view-section active">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading Quran data...</p>
            </div>
        </div>
    </div>

    <script>
        let quranData = [];
        let allAyahs = {};
        const API_URL = 'https://api.alquran.cloud/v1';

        async function init() {
            try {
                await loadQuranData();
                document.getElementById('loadingView').classList.remove('active');
                showView('list');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingView').innerHTML = '<p class="no-results">Error loading data. Please refresh.</p>';
            }
        }

        async function loadQuranData() {
            try {
                const response = await fetch(`${API_URL}/surah`);
                const data = await response.json();
                quranData = data.data;
            } catch (error) {
                console.error('API Error:', error);
            }
        }

        async function loadSurahAyahs(surahNumber) {
            try {
                const arabicResponse = await fetch(`${API_URL}/surah/${surahNumber}`);
                const arabicData = await arabicResponse.json();
                const arabicAyahs = arabicData.data.ayahs;

                const englishResponse = await fetch(`${API_URL}/surah/${surahNumber}/en.asad`);
                const englishData = await englishResponse.json();
                const englishAyahs = englishData.data.ayahs;

                allAyahs[surahNumber] = arabicAyahs.map((ayah, index) => ({
                    numberInSurah: ayah.numberInSurah,
                    text: ayah.text,
                    translation: englishAyahs[index]?.text || 'Translation not available'
                }));
            } catch (error) {
                console.error('Error loading ayahs:', error);
            }
        }

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            if (view === 'list') {
                document.getElementById('listView').classList.add('active');
                displaySurahs(quranData);
            } else if (view === 'detail') {
                document.getElementById('detailView').classList.add('active');
            }
        }

        function displaySurahs(surahs) {
            const surahsList = document.getElementById('surahsList');
            document.getElementById('searchCount').textContent = surahs.length;

            if (surahs.length === 0) {
                surahsList.innerHTML = '<p class="no-results">No Surahs found</p>';
                return;
            }

            surahsList.innerHTML = surahs.map(surah => `
                <div class="surah-card" onclick="showSurahDetail(${surah.number})">
                    <div class="surah-number">Surah ${surah.number}</div>
                    <div class="surah-name-en">${surah.englishName}</div>
                    <div class="surah-name-ar">${surah.name}</div>
                    <div class="surah-ayahs">${surah.numberOfAyahs} Ayahs • ${surah.revelationType}</div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput')?.addEventListener('keyup', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = quranData.filter(surah =>
                surah.englishName.toLowerCase().includes(searchTerm) ||
                surah.name.toLowerCase().includes(searchTerm) ||
                surah.number.toString().includes(searchTerm)
            );
            displaySurahs(filtered);
        });

        async function showSurahDetail(surahNumber) {
            if (!allAyahs[surahNumber]) {
                await loadSurahAyahs(surahNumber);
            }

            const surah = quranData.find(s => s.number === surahNumber);
            const ayahs = allAyahs[surahNumber] || [];

            let html = `
                <div class="surah-header">
                    <h2>${surah.englishName}</h2>
                    <div class="surah-header-ar">${surah.name}</div>
                    <div class="surah-info">
                        <div>📍 <strong>Surah:</strong> ${surah.number}</div>
                        <div>📚 <strong>Ayahs:</strong> ${surah.numberOfAyahs}</div>
                        <div>🕌 <strong>Type:</strong> ${surah.revelationType}</div>
                    </div>
                </div>
                <div class="ayahs-container">
                    ${ayahs.length > 0 ? ayahs.map(ayah => `
                        <div class="ayah">
                            <div class="ayah-number">Ayah ${ayah.numberInSurah}</div>
                            <div class="ayah-text-ar">${ayah.text || ''}</div>
                            <div class="ayah-text-en">${ayah.translation || 'Translation not available'}</div>
                        </div>
                    `).join('') : '<p>Loading Ayahs...</p>'}
                </div>
                <div class="ml-section">
                    <h3>🤖 AI Features (Coming Soon)</h3>
                    <p>• Semantic Search - Find related verses by meaning</p>
                    <p>• Tafseer Suggestions - AI-powered interpretations</p>
                    <p>• Personalized Recommendations</p>
                </div>
            `;

            document.getElementById('surahDetail').innerHTML = html;
            showView('detail');
        }

        function showRandomSurah() {
            const randomIndex = Math.floor(Math.random() * quranData.length);
            showSurahDetail(quranData[randomIndex].number);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
